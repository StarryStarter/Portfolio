<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0B0B0B"/>
  <circle cx="32" cy="32" r="10" fill="#00E599">
    <animate attributeName="r" values="9;13;9" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#00E599" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="16;22;16" dur="2.4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite" />
  </circle>
</svg>
